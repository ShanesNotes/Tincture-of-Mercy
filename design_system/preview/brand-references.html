<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Brand · References</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
html,body{margin:0;padding:0;background:var(--bg);font-family:var(--serif-body)}
.wrap{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
figure{margin:0}
.frame{aspect-ratio:1;background:var(--vellum-bone);border:2px solid var(--ink);padding:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:var(--shadow-paper)}
.frame img{max-width:100%;max-height:100%;display:block;mix-blend-mode:multiply;opacity:.92}
figcaption{font-family:var(--serif-icon);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3);margin-top:6px;text-align:center}
</style></head><body><div class="wrap">
<figure><div class="frame"><img src="../assets/reference/cosmic-image.jpg" alt="cosmic crucifixion"/></div><figcaption>Cosmic Crucifixion</figcaption></figure>
<figure><div class="frame"><img src="../assets/reference/noah-cosmic-flood.jpg" alt="noah ark"/></div><figcaption>Noah · Cosmic Flood</figcaption></figure>
<figure><div class="frame"><img src="../assets/reference/st-george-dragon.jpg" alt="st george"/></div><figcaption>St. George · Dragon</figcaption></figure>
</div></body></html>
