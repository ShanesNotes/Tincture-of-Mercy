<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg1);font-family:var(--serif-body)}
.card{padding:18px 22px}
.row{display:grid;grid-template-columns:60px 60px 1fr;gap:14px;align-items:center;padding:5px 0;border-bottom:1px solid var(--rule-soft)}
.row:last-child{border-bottom:0}
.name{font-family:var(--mono-witte);font-size:10px;letter-spacing:.16em;color:var(--fg3);text-transform:uppercase}
.px{font-family:var(--mono-witte);font-size:10px;color:var(--fg3);text-align:right}
.bar{height:14px;background:var(--ink);border-radius:1px}
</style></head><body><div class="card">
<div class="row"><div class="name">s-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="name">s-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="name">s-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="name">s-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="name">s-5</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="name">s-6</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="name">s-7</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="name">s-8</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
<div class="row"><div class="name">s-9</div><div class="px">96px</div><div class="bar" style="width:96px"></div></div>
</div></body></html>
