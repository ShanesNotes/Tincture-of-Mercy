<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — Healing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg1); font-family: var(--serif-body); }
  .card { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch { border-radius: 4px; overflow: hidden; border: 1px solid var(--rule); height: 100px; display: flex; flex-direction: column; }
  .chip { flex: 1; }
  .meta { padding: 8px 10px; background: var(--bg-elevated); border-top: 1px solid var(--rule); }
  .name { font-family: var(--serif-body); font-size: 12px; color: var(--ink); }
  .role { font-family: var(--serif-body); font-size: 10px; color: var(--fg3); font-style: italic; margin-top: 2px; }
  .hex { font-family: var(--mono-witte); font-size: 9px; color: var(--fg3); letter-spacing: 0.06em; }
  h4 { font-family: var(--mono-witte); font-size: 10px; letter-spacing: 0.18em; color: var(--fg3); text-transform: uppercase; margin: 0 0 12px; }
</style>
</head>
<body>
<div class="card">
  <h4>Semantic · healing, presence, danger</h4>
  <div class="row">
    <div class="swatch"><div class="chip" style="background: #7a8c5e"></div><div class="meta"><div class="name">Pale heal</div><div class="role">Pulseleaf · Lena</div></div></div>
    <div class="swatch"><div class="chip" style="background: #5a6b48"></div><div class="meta"><div class="name">Pale heal deep</div><div class="role">Bethany accent</div></div></div>
    <div class="swatch"><div class="chip" style="background: #6b4a2c"></div><div class="meta"><div class="name">Cedar brown</div><div class="role">Presence · the dog</div></div></div>
    <div class="swatch"><div class="chip" style="background: #c63e1f"></div><div class="meta"><div class="name">Ember red</div><div class="role">Strange Fire</div></div></div>
  </div>
</div>
</body>
</html>
