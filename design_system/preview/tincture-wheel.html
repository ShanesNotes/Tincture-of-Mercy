<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Tincture wheel</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
html,body{margin:0;padding:0;background:var(--bg);font-family:var(--serif-body)}
.wrap{padding:14px 22px;display:flex;gap:24px;align-items:center}
svg{display:block}
.meta{font-family:var(--serif-icon);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg2)}
.title{font-family:var(--serif-display);font-size:20px;color:var(--ink);margin-bottom:4px}
.sub{font-family:var(--serif-body);font-style:italic;font-size:13px;color:var(--fg3);margin-bottom:10px}
.legend div{font-size:11px;color:var(--fg2);margin:3px 0;font-family:var(--mono-witte);letter-spacing:.06em;text-transform:uppercase}
.legend span{display:inline-block;width:8px;height:8px;margin-right:6px;vertical-align:middle}
</style></head><body><div class="wrap">
<svg viewBox="0 0 160 160" width="150" height="150">
  <circle cx="80" cy="80" r="68" fill="none" stroke="#1a1612" stroke-width="1.2"/>
  <circle cx="80" cy="80" r="44" fill="none" stroke="#1a1612" stroke-width=".8" opacity=".4"/>
  <circle cx="80" cy="80" r="24" fill="none" stroke="#1a1612" stroke-width=".6" opacity=".3"/>
  <line x1="80" y1="12" x2="80" y2="148" stroke="#1a1612" stroke-width=".6" opacity=".5"/>
  <line x1="12" y1="80" x2="148" y2="80" stroke="#1a1612" stroke-width=".6" opacity=".5"/>
  <!-- shape: relief 60 / warmth 70 / stability 40 / risk 25 -->
  <polygon points="80,28 36,80 80,128 116,80" fill="#7a8c5e" fill-opacity=".5" stroke="#5a6b48" stroke-width="1.2"/>
  <text x="80" y="8" text-anchor="middle" font-family="Cinzel" font-size="8" letter-spacing="2" fill="#1a1612">RELIEF</text>
  <text x="80" y="158" text-anchor="middle" font-family="Cinzel" font-size="8" letter-spacing="2" fill="#1a1612">STABILITY</text>
  <text x="6" y="83" font-family="Cinzel" font-size="8" letter-spacing="2" fill="#1a1612">WARMTH</text>
  <text x="154" y="83" text-anchor="end" font-family="Cinzel" font-size="8" letter-spacing="2" fill="#1a1612">RISK</text>
</svg>
<div>
<div class="meta">Pulseleaf Draught</div>
<div class="title" style="font-size:24px;font-family:var(--hand-script)">sound &mdash; bitter but clear</div>
<div class="sub">Pulseleaf ×2 · Clean Water · Honey</div>
<div class="legend">
  <div><span style="background:#5a6b48"></span>Crafted shape</div>
  <div><span style="background:#1a1612;opacity:.4"></span>Wheel rings</div>
</div>
</div>
</div></body></html>
