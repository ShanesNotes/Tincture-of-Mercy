<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — Earned Accents</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg1); font-family: var(--serif-body); }
  .card { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .swatch { border-radius: 4px; overflow: hidden; border: 1px solid var(--rule); height: 100px; display: flex; flex-direction: column; }
  .chip { flex: 1; }
  .meta { padding: 8px 10px; background: var(--bg-elevated); border-top: 1px solid var(--rule); }
  .name { font-family: var(--serif-body); font-size: 12px; color: var(--ink); }
  .hex { font-family: var(--mono-witte); font-size: 9px; color: var(--fg3); letter-spacing: 0.06em; }
  h4 { font-family: var(--mono-witte); font-size: 10px; letter-spacing: 0.18em; color: var(--fg3); text-transform: uppercase; margin: 0 0 12px; }
  .note { font-family: var(--serif-body); font-size: 11px; font-style: italic; color: var(--fg3); margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <h4>Earned · gold and red appear sparingly</h4>
  <div class="row">
    <div class="swatch"><div class="chip" style="background: #d9b057"></div><div class="meta"><div class="name">Icon gold warm</div><div class="hex">#d9b057</div></div></div>
    <div class="swatch"><div class="chip" style="background: #c79a3a"></div><div class="meta"><div class="name">Icon gold</div><div class="hex">#c79a3a</div></div></div>
    <div class="swatch"><div class="chip" style="background: #e26a3a"></div><div class="meta"><div class="name">Ember glow</div><div class="hex">#e26a3a</div></div></div>
    <div class="swatch"><div class="chip" style="background: #c63e1f"></div><div class="meta"><div class="name">Ember red</div><div class="hex">#c63e1f</div></div></div>
    <div class="swatch"><div class="chip" style="background: #8a2018"></div><div class="meta"><div class="name">Dragon red</div><div class="hex">#8a2018</div></div></div>
    <div class="swatch"><div class="chip" style="background: #6e8a7c"></div><div class="meta"><div class="name">Verdigris</div><div class="hex">#6e8a7c</div></div></div>
  </div>
  <div class="note">Use as a single mark, never as fill. Halos, vials, accusation rules — never decoration.</div>
</div>
</body>
</html>
