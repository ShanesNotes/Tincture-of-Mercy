<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — Cold Michigan</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg1); font-family: var(--serif-body); }
  .card { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .swatch { border-radius: 4px; overflow: hidden; border: 1px solid var(--rule); height: 100px; display: flex; flex-direction: column; }
  .chip { flex: 1; }
  .meta { padding: 8px 10px; background: var(--bg-elevated); border-top: 1px solid var(--rule); }
  .name { font-family: var(--serif-body); font-size: 12px; color: var(--ink); }
  .hex { font-family: var(--mono-witte); font-size: 9px; color: var(--fg3); letter-spacing: 0.06em; }
  h4 { font-family: var(--mono-witte); font-size: 10px; letter-spacing: 0.18em; color: var(--fg3); text-transform: uppercase; margin: 0 0 12px; }
</style>
</head>
<body>
<div class="card">
  <h4>Cold Michigan · forest, lake, hearth</h4>
  <div class="row">
    <div class="swatch"><div class="chip" style="background: #5b6770"></div><div class="meta"><div class="name">Lake slate</div><div class="hex">#5b6770</div></div></div>
    <div class="swatch"><div class="chip" style="background: #2c3540"></div><div class="meta"><div class="name">Lake deep</div><div class="hex">#2c3540</div></div></div>
    <div class="swatch"><div class="chip" style="background: #2a3329"></div><div class="meta"><div class="name">Pine shadow</div><div class="hex">#2a3329</div></div></div>
    <div class="swatch"><div class="chip" style="background: #6b4a2c"></div><div class="meta"><div class="name">Cedar brown</div><div class="hex">#6b4a2c</div></div></div>
    <div class="swatch"><div class="chip" style="background: #4a3a26"></div><div class="meta"><div class="name">Rot brown</div><div class="hex">#4a3a26</div></div></div>
    <div class="swatch"><div class="chip" style="background: #b08a4a"></div><div class="meta"><div class="name">Old ochre</div><div class="hex">#b08a4a</div></div></div>
  </div>
</div>
</body>
</html>
