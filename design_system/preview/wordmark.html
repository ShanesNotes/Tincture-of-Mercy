<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
html,body{margin:0;padding:0;background:var(--bg);font-family:var(--serif-body)}
.wrap{padding:24px 28px;display:flex;flex-direction:column;gap:18px}
.mark{display:flex;align-items:baseline;gap:10px;color:var(--ink)}
.mark .gem{font-family:var(--serif-display);font-size:14px;color:var(--ember-red);transform:rotate(45deg);display:inline-block}
.mark .word{font-family:var(--serif-display);font-size:42px;letter-spacing:-.012em;line-height:1}
.mark .sub{font-family:var(--serif-icon);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--damp-ash)}
.mark.dark{background:var(--ink);color:var(--candle-pure);padding:18px 22px;border-radius:2px}
.mark.dark .sub{color:var(--icon-gold-warm)}
.note{font-family:var(--serif-body);font-style:italic;font-size:11px;color:var(--fg3)}
</style></head><body><div class="wrap">
<div class="mark"><span class="gem">◆</span><span class="word">Tincture of Mercy</span></div>
<div class="mark"><span class="word" style="font-size:22px">Tincture of Mercy</span><span class="sub">The Garments of Skin</span></div>
<div class="mark dark"><span class="gem">◆</span><span class="word" style="font-size:28px">Tincture of Mercy</span></div>
<div class="note">Placeholder wordmark · IM Fell English · ember-red diamond. Flagged for replacement.</div>
</div></body></html>
