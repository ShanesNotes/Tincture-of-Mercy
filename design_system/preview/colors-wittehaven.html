<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — Wittehaven</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f6f7; color: var(--lake-deep); font-family: var(--mono-witte); }
  .card { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .swatch { overflow: hidden; border: 1px solid #8fa3b0; height: 100px; display: flex; flex-direction: column; }
  .chip { flex: 1; }
  .meta { padding: 8px 10px; background: #ffffff; border-top: 1px solid #d5dee4; }
  .name { font-family: var(--mono-witte); font-size: 11px; color: var(--lake-deep); letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-family: var(--mono-witte); font-size: 9px; color: var(--witte-cool); letter-spacing: 0.06em; margin-top: 2px; }
  h4 { font-family: var(--mono-witte); font-size: 10px; letter-spacing: 0.18em; color: var(--witte-cool); text-transform: uppercase; margin: 0 0 12px; }
  .note { font-family: var(--serif-body); font-style: italic; font-size: 11px; color: var(--lake-slate); margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <h4>Wittehaven · the seductive regime</h4>
  <div class="row">
    <div class="swatch"><div class="chip" style="background: #ffffff"></div><div class="meta"><div class="name">Pure</div><div class="hex">#ffffff</div></div></div>
    <div class="swatch"><div class="chip" style="background: #f4f6f7"></div><div class="meta"><div class="name">Witte white</div><div class="hex">#f4f6f7</div></div></div>
    <div class="swatch"><div class="chip" style="background: #d5dee4"></div><div class="meta"><div class="name">Witte blue</div><div class="hex">#d5dee4</div></div></div>
    <div class="swatch"><div class="chip" style="background: #8fa3b0"></div><div class="meta"><div class="name">Witte cool</div><div class="hex">#8fa3b0</div></div></div>
    <div class="swatch"><div class="chip" style="background: #5b6770"></div><div class="meta"><div class="name">Lake slate</div><div class="hex">#5b6770</div></div></div>
    <div class="swatch"><div class="chip" style="background: #2c3540"></div><div class="meta"><div class="name">Lake deep</div><div class="hex">#2c3540</div></div></div>
  </div>
  <div class="note">Apply via .regime-wittehaven. Radii collapse to 0; mono replaces serif on chart surfaces.</div>
</div>
</body>
</html>
