<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Notebook entry</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
html,body{margin:0;padding:0;background:var(--rot-brown);font-family:var(--serif-body);min-height:100%}
.page{margin:18px 22px;background:var(--vellum-bone);padding:22px 28px;box-shadow:var(--shadow-card);border-radius:2px;background-image:repeating-linear-gradient(to bottom,transparent 0 21px,rgba(26,22,18,.08) 21px 22px)}
.line1{font-family:var(--serif-icon);font-size:10px;letter-spacing:.18em;color:var(--damp-ash);text-transform:uppercase;margin-bottom:8px}
.name{font-family:var(--hand-script);font-size:30px;color:var(--ink);line-height:1;margin-bottom:6px}
.note{font-family:var(--hand-script);font-size:18px;color:var(--ink-soft);line-height:1.3;font-style:italic}
</style></head><body><div class="page">
<div class="line1">Page 66 · Line 7</div>
<div class="name">Eli Keene</div>
<div class="note">The breath left before the name did.</div>
</div></body></html>
