<!doctype html>
<meta charset="utf-8">
<title>Tincture visual comparison</title>
<style>
body { margin: 24px; background: #1a1612; color: #e8dfc9; font-family: Georgia, serif; }
.grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
figure { margin: 0; }
img { width: 100%; image-rendering: pixelated; border: 2px solid #2b2520; }
figcaption { margin-top: 8px; color: #c79a3a; }
</style>
<h1>Tincture visual comparison</h1>
<p>Frame extracted at 00:00:00.5. Baseline and current use the same 240-frame Godot movie path.</p>
<div class="grid">
  <figure><img src="baseline.png" alt="baseline frame"><figcaption>baseline — screenshots/baseline.avi</figcaption></figure>
  <figure><img src="current.png" alt="current frame"><figcaption>current — screenshots/current.avi</figcaption></figure>
</div>
